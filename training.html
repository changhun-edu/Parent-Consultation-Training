<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학부모 상담 훈련</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #0f172a; }

    /* ── 헤더 ──────────────────────────────────── */
    .training-header {
      background: rgba(15,23,42,.97); border-bottom: 1px solid var(--border);
      padding: 12px 20px; position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(8px);
    }
    .training-header__inner {
      max-width: 720px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    .training-header__info { flex: 1; min-width: 0; }
    .training-header__title {
      font-size: 15px; font-weight: 800; color: var(--txt);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .training-header__meta { font-size: 11px; color: var(--txt3); margin-top: 1px; }

    /* ── 배너 ──────────────────────────────────── */
    .situation-banner {
      margin: 14px 20px 0; padding: 12px 16px;
      background: rgba(99,102,241,.07); border: 1px solid rgba(99,102,241,.2);
      border-radius: var(--radius-sm); font-size: 12px; color: var(--txt2); line-height: 1.6;
    }
    .situation-banner__label { color: #a5b4fc; font-weight: 700; margin-right: 4px; }

    /* ── 감정 바 ────────────────────────────────── */
    .emotion-wrap { margin: 10px 20px 0; }

    /* ── 채팅 영역 ──────────────────────────────── */
    .chat-area { max-width: 720px; margin: 0 auto; padding: 16px 20px 48px; }

    /* ── 과거 대화 히스토리 ─────────────────────── */
    .history-exchange { margin-bottom: 20px; opacity: .65; }
    .history-exchange:last-child { margin-bottom: 28px; }

    /* ── 학부모 말풍선 ─────────────────────────── */
    .parent-bubble { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 14px; }
    .parent-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(239,68,68,.15); border: 2px solid rgba(239,68,68,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .parent-bubble__body {
      max-width: 80%; padding: 13px 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px 16px 16px 4px;
      font-size: 14px; line-height: 1.75; color: var(--txt);
    }
    .parent-bubble__name { font-size: 11px; color: var(--txt3); margin-bottom: 4px; font-weight: 600; }

    /* ── 교사 답변 버블 (제출 후) ────────────────── */
    .teacher-bubble {
      display: none; justify-content: flex-end;
      align-items: flex-end; gap: 10px; margin-bottom: 14px;
    }
    .teacher-bubble__body {
      max-width: 80%; padding: 13px 16px;
      background: linear-gradient(135deg, rgba(59,130,246,.18), rgba(99,102,241,.18));
      border: 1px solid rgba(99,102,241,.35);
      border-radius: 16px 16px 4px 16px;
      font-size: 14px; line-height: 1.75; color: var(--txt);
    }
    .teacher-bubble__meta {
      font-size: 11px; margin-top: 6px;
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
    }
    .teacher-bubble__score { font-weight: 800; font-size: 13px; }
    .teacher-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(99,102,241,.18); border: 2px solid rgba(99,102,241,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    /* ── 입력 영역 ──────────────────────────────── */
    .teacher-input-wrap { margin-bottom: 14px; }
    .teacher-input-label {
      font-size: 12px; color: var(--txt3); font-weight: 600;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .teacher-input-label span { color: #a5b4fc; }
    #teacher-textarea {
      width: 100%; min-height: 110px;
      background: var(--bg2); border: 1px solid rgba(99,102,241,.3);
      border-radius: var(--radius); padding: 14px 16px;
      color: var(--txt); font-size: 14px; line-height: 1.7;
      resize: vertical; outline: none; font-family: inherit;
      transition: border-color .2s;
    }
    #teacher-textarea:focus { border-color: rgba(99,102,241,.65); }
    #teacher-textarea::placeholder { color: var(--txt3); }
    .teacher-input-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px;
    }
    #char-count { font-size: 12px; color: var(--txt3); }
    .hint-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 10px; }
    .hint-tag {
      font-size: 11px; padding: 3px 10px;
      background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2);
      border-radius: 12px; color: #a5b4fc; cursor: pointer; transition: all .15s;
    }
    .hint-tag:hover { background: rgba(99,102,241,.18); }
    #submit-btn {
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity .2s;
    }
    #submit-btn:hover { opacity: .88; }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── 평가 패널 ──────────────────────────────── */
    .eval-panel {
      display: none; margin-bottom: 12px;
      background: rgba(30,41,59,.7); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .eval-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid var(--border2);
    }
    .eval-header__score { font-size: 32px; font-weight: 900; line-height: 1; }
    .eval-header__grade { font-size: 14px; font-weight: 700; }
    .eval-body { padding: 16px 20px; }
    .eval-item { margin-bottom: 12px; }
    .eval-item:last-child { margin-bottom: 0; }
    .eval-item__header {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--txt2); margin-bottom: 4px;
    }
    .eval-item__score { font-weight: 800; font-size: 13px; }
    .eval-bar-track {
      height: 6px; background: rgba(30,41,59,.9);
      border-radius: 3px; overflow: hidden; margin-bottom: 3px;
    }
    .eval-bar-fill { height: 100%; border-radius: 3px; transition: width .9s ease; }
    .eval-hits { font-size: 11px; color: var(--txt3); }
    .eval-feedback {
      margin-top: 12px; padding: 12px 16px;
      background: rgba(245,158,11,.07); border: 1px solid rgba(245,158,11,.2);
      border-radius: var(--radius-sm); font-size: 13px; color: var(--txt2); line-height: 1.7;
    }
    .eval-feedback--good {
      background: rgba(34,197,94,.07); border-color: rgba(34,197,94,.2);
    }
    .eval-fb-item { margin-bottom: 4px; }
    .eval-fb-item:last-child { margin-bottom: 0; }

    /* ── 모범 답변 패널 ─────────────────────────── */
    .model-panel {
      display: none; margin-bottom: 14px;
      background: rgba(99,102,241,.07); border: 1px solid rgba(99,102,241,.25);
      border-radius: var(--radius); padding: 18px 20px;
    }
    .model-panel__label { font-size: 12px; color: #a5b4fc; font-weight: 700; margin-bottom: 10px; }
    .model-panel__text {
      font-size: 14px; line-height: 1.8; color: var(--txt);
      padding: 12px 16px; background: rgba(0,0,0,.2);
      border-radius: var(--radius-sm); border-left: 3px solid var(--indigo);
      margin-bottom: 10px; font-style: italic;
    }
    .model-panel__tip { font-size: 12px; color: var(--txt3); line-height: 1.5; }

    /* ── 다음 버튼 ──────────────────────────────── */
    .next-btn {
      display: none; width: 100%; justify-content: center;
      padding: 13px; margin-bottom: 14px;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      border: none; border-radius: var(--radius);
      color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; gap: 8px;
    }
    .next-btn:hover { opacity: .9; }

    /* ── 종료 화면 ──────────────────────────────── */
    .end-screen { display: none; padding-bottom: 48px; }
    .end-score-card {
      padding: 28px 24px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 14px; text-align: center;
    }
    .end-emoji   { font-size: 48px; margin-bottom: 6px; display: block; }
    .end-score   { font-size: 56px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .end-label-badge {
      display: inline-block; padding: 4px 14px; border-radius: 12px; border: 1px solid;
      font-size: 13px; font-weight: 700; margin-bottom: 14px;
    }
    .end-summary { font-size: 14px; color: var(--txt2); line-height: 1.7; }
    .end-turn-chart {
      display: flex; align-items: flex-end; gap: 6px;
      height: 56px; padding: 0 4px; margin-top: 16px;
    }
    .end-section {
      padding: 14px 18px; border-radius: var(--radius-sm); margin-bottom: 12px;
    }
    .end-section__title { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .end-section ul { padding-left: 20px; }
    .end-section li { font-size: 13px; color: var(--txt); line-height: 1.7; margin-bottom: 3px; }
    .end-section--strengths    { background: rgba(34,197,94,.06);  border: 1px solid rgba(34,197,94,.2); }
    .end-section--improvements { background: rgba(245,158,11,.06); border: 1px solid rgba(245,158,11,.2); }
    .end-section--next         { background: rgba(99,102,241,.07); border: 1px solid rgba(99,102,241,.2); }
    .end-section--strengths    .end-section__title { color: #4ade80; }
    .end-section--improvements .end-section__title { color: #fbbf24; }
    .end-section--next         .end-section__title { color: #a5b4fc; }
    .end-next-text { font-size: 14px; color: #a5b4fc; font-weight: 600; line-height: 1.6; }
    .end-btns { display: flex; gap: 10px; }
    .end-btns .btn { flex: 1; justify-content: center; }

    @media (max-width: 480px) {
      .parent-bubble__body, .teacher-bubble__body { max-width: 90%; font-size: 13px; }
      #teacher-textarea { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="training-header">
  <div class="training-header__inner">
    <a href="index.html" class="btn btn--ghost btn--sm">← 목록</a>
    <div class="training-header__info">
      <div class="training-header__title" id="scenario-title">—</div>
      <div class="training-header__meta">
        <span id="scenario-category" style="font-weight:700"></span>&nbsp;·&nbsp;
        <span id="difficulty-badge" class="badge"></span>&nbsp;·&nbsp;
        <span id="turn-count" style="color:var(--txt3)">1번째 상황</span>
      </div>
    </div>
    <button id="eval-btn" onclick="requestEval()"
      style="padding:7px 14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
             border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;
             cursor:pointer;white-space:nowrap;flex-shrink:0;opacity:.5;pointer-events:none;"
      title="대화를 진행하면 평가받기가 활성화됩니다">
      📊 평가받기
    </button>
  </div>
</header>

<!-- 상황 배너 -->
<div class="situation-banner container--narrow">
  <span class="situation-banner__label">📌 상황</span>
  <span id="scenario-situation"></span>
</div>

<!-- 감정 바 -->
<div class="emotion-wrap container--narrow">
  <div class="emotion-bar">
    <span class="emotion-bar__label">👩 <span id="parent-name-header">학부모</span> 감정</span>
    <div class="emotion-bar__track">
      <div class="emotion-bar__fill" id="emotion-fill" style="width:70%;background:#f59e0b"></div>
    </div>
    <span class="emotion-bar__text">
      <span id="emotion-label" style="color:var(--yellow)">다소 불안</span>
      &nbsp;<span id="emotion-value" style="color:var(--txt3);font-size:11px">70</span>
    </span>
  </div>
</div>

<!-- 채팅 영역 -->
<div class="chat-area container--narrow">

  <!-- 누적 대화 히스토리 -->
  <div id="chat-history-wrap"></div>

  <!-- 학부모 말풍선 -->
  <div class="parent-bubble">
    <div class="parent-avatar">👩</div>
    <div class="parent-bubble__body">
      <div class="parent-bubble__name" id="parent-name-bubble">학부모</div>
      <div id="parent-message">메시지를 불러오는 중…</div>
    </div>
  </div>

  <!-- 교사 답변 버블 (제출 후 표시) -->
  <div class="teacher-bubble" id="teacher-bubble">
    <div class="teacher-bubble__body">
      <div id="teacher-bubble-text"></div>
      <div class="teacher-bubble__meta">
        <span style="font-size:11px;color:var(--txt3)">내 답변</span>
        <span class="teacher-bubble__score" id="teacher-bubble-score"></span>
      </div>
    </div>
    <div class="teacher-avatar">🧑‍🏫</div>
  </div>

  <!-- 입력 영역 -->
  <div class="teacher-input-wrap" id="teacher-input-wrap">
    <div class="teacher-input-label">
      🧑‍🏫 <span>교사로서 직접 답변을 입력하세요</span>
      <span style="margin-left:auto;font-size:11px;color:var(--txt3);font-weight:400">Enter 전송 · Shift+Enter 줄바꿈</span>
    </div>

    <!-- 빠른 입력 힌트 -->
    <div class="hint-tags">
      <span class="hint-tag" onclick="insertHint('많이 놀라셨겠어요.')">💛 많이 놀라셨겠어요</span>
      <span class="hint-tag" onclick="insertHint('충분히 이해합니다.')">🤝 충분히 이해합니다</span>
      <span class="hint-tag" onclick="insertHint('확인 후 연락드리겠습니다.')">📅 확인 후 연락</span>
      <span class="hint-tag" onclick="insertHint('함께 방법을 찾아보겠습니다.')">🔧 함께 방법을</span>
    </div>

    <textarea id="teacher-textarea"
      placeholder="학부모에게 어떻게 응답하시겠습니까?&#10;&#10;예시) 어머니, 많이 놀라셨겠어요. 상황을 확인해보고 오늘 중으로 연락드리겠습니다."
      rows="4"></textarea>
    <div class="teacher-input-footer">
      <span id="char-count">0자</span>
      <button id="submit-btn" onclick="submitResponse()">전송 ↵</button>
    </div>
  </div>

  <!-- 평가 패널 -->
  <div class="eval-panel" id="eval-panel">
    <div class="eval-header">
      <div>
        <div class="eval-header__score" id="eval-total">0점</div>
        <div class="eval-header__grade" id="eval-grade"></div>
      </div>
      <!-- 미니 막대 -->
      <div style="flex:1;margin-left:16px">
        <div style="height:8px;background:rgba(30,41,59,.9);border-radius:4px;overflow:hidden">
          <div id="eval-total-bar" style="height:100%;border-radius:4px;transition:width 1s ease"></div>
        </div>
      </div>
    </div>
    <div class="eval-body">
      <div id="eval-breakdown"></div>
      <div class="eval-feedback" id="eval-feedback" style="display:none"></div>
    </div>
  </div>

  <!-- 모범 답변 패널 -->
  <div class="model-panel" id="model-panel">
    <div class="model-panel__label">💬 모범 답변</div>
    <div class="model-panel__text" id="model-text"></div>
    <div class="model-panel__tip" id="model-tip"></div>
  </div>

  <!-- 다음 버튼 -->
  <button class="next-btn btn" id="next-btn">다음 상황으로 →</button>

  <!-- 종료 화면 -->
  <div class="end-screen" id="end-screen">
    <div class="end-score-card">
      <span class="end-emoji" id="end-emoji">🌟</span>
      <div class="end-score" id="end-score">—</div>
      <div><span class="end-label-badge" id="end-label-badge">—</span></div>
      <p class="end-summary" id="end-summary"></p>
      <!-- 턴별 점수 차트 -->
      <div class="end-turn-chart" id="end-turn-chart"
           style="justify-content:center;border-top:1px solid var(--border2);margin-top:16px;padding-top:16px"></div>
    </div>

    <!-- 턴별 모범 답변 비교 -->
    <div id="end-model-section"
         style="background:rgba(30,41,59,.7);border:1px solid var(--border);
                border-radius:var(--radius);padding:16px 20px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#a5b4fc;margin-bottom:14px">
        💬 대화별 모범 답변 비교
      </div>
    </div>

    <div class="end-section end-section--strengths" id="end-strengths-section">
      <div class="end-section__title">✅ 잘한 점</div>
      <ul id="end-strengths-list"></ul>
    </div>
    <div class="end-section end-section--improvements" id="end-improvements-section">
      <div class="end-section__title">📝 개선할 점</div>
      <ul id="end-improvements-list"></ul>
    </div>
    <div class="end-section end-section--next">
      <div class="end-section__title">🎯 다음 연습 포인트</div>
      <div class="end-next-text" id="end-next-practice"></div>
    </div>

    <div class="end-btns">
      <button class="btn btn--ghost" onclick="restartScenario()">🔄 다시 연습</button>
      <a href="index.html" class="btn btn--primary">🏠 다른 시나리오</a>
    </div>
  </div>

</div><!-- /chat-area -->

<script>
/* =====================================================
   training.js  –  채팅형 다회차 상담 훈련
   
   대화 흐름:
     학부모 발화 → 교사 입력(Enter) → 다음 학부모 발화
     → ... → 모든 대화 끝나면 자동 전체 평가
   
   평가받기 버튼:
     대화 중 언제든 클릭 → 지금까지의 전체 평가
   
   API 없음 - JSON 저장 대화 + 키워드 자동 평가
   ===================================================== */

const DIFFICULTY_LABEL = { 1:'⭐ 초급', 2:'⭐⭐ 중급', 3:'⭐⭐⭐ 고급' };

/* ── 평가 루브릭 ───────────────────────────────────── */
const RUBRIC = [
  { key:'empathy',   label:'공감 표현', icon:'💛', max:30, perHit:12,
    words:['많이','충분히','이해합니다','이해해요','걱정','마음이','속상',
           '놀라셨겠','안타깝','힘드셨겠','당황하셨겠','그러셨겠','아쉬우셨',
           '서운하셨겠','힘들었겠','속상하셨겠','충분히 이해','죄송'] },
  { key:'solution',  label:'해결 방향', icon:'🔧', max:25, perHit:9,
    words:['확인','살펴보','이야기 나누','알려드리','연락드리','방법을','조치',
           '지도하겠','함께','노력','챙기겠','처리하겠','파악하겠','점검'] },
  { key:'fact',      label:'사실 기반', icon:'📋', max:20, perHit:8,
    words:['직접','확인했','상황을','당시','기록','목격','제가 보','처치','양호실'] },
  { key:'followup',  label:'후속 약속', icon:'📅', max:15, perHit:9,
    words:['연락드리겠','문자','알려드리겠','다시 연락','확인하겠습니다',
           '살펴보겠','이번 주','금요일','내일','바로'] },
  { key:'defensive', label:'방어적 표현', icon:'⚠️', max:0, perHit:-15, penalty:true,
    words:['규정상','원래 그런','어쩔 수 없','흔한','경미한','별거 아','그런 사실이 없',
           '아닌데요','저는 잘못이','당연히'] },
];

/* ── 게임 상태 ─────────────────────────────────────── */
const state = {
  scenario:    null,
  turnIndex:   0,
  totalTurns:  0,
  emotionLevel: 0,
  phase: 'loading',   // loading | input | complete
  turnHistory: [],    // [{ parentMsg, teacherInput, score }]
  allScores:   [],
};

const $ = id => document.getElementById(id);

/* ════════════════════════════════════════════════════
   초기화
   ════════════════════════════════════════════════════ */
async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'index.html'; return; }

  try {
    const data = await fetch('data/scenarios.json').then(r => r.json());
    state.scenario = data.scenarios.find(s => s.id === id);
  } catch { showError('데이터를 불러오지 못했습니다.'); return; }

  if (!state.scenario) { location.href = 'index.html'; return; }

  state.totalTurns   = state.scenario.turns.length;
  state.turnIndex    = 0;
  state.emotionLevel = state.scenario.initialEmotion;

  applyMeta();
  updateEmotionBar(state.emotionLevel, true);

  const ta = $('teacher-textarea');
  // Enter → 전송, Shift+Enter → 줄바꿈
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitResponse();
    }
  });
  ta.addEventListener('input', updateCharCount);

  renderTurn();
}

/* ════════════════════════════════════════════════════
   메타 정보
   ════════════════════════════════════════════════════ */
function applyMeta() {
  const s = state.scenario;
  document.title = `${s.title} – 학부모 상담 훈련`;
  setText('scenario-title',     s.title);
  setText('scenario-category',  s.categoryIcon + ' ' + s.category);
  setText('scenario-situation', s.situation);
  setText('parent-name-header', s.parentName);
  setText('parent-name-bubble', s.parentName);
  $('scenario-category').style.color = s.categoryColor;
  const db = $('difficulty-badge');
  db.className   = `badge badge--d${s.difficulty}`;
  db.textContent = DIFFICULTY_LABEL[s.difficulty];
}

/* ════════════════════════════════════════════════════
   현재 턴 렌더링
   ════════════════════════════════════════════════════ */
function renderTurn() {
  const turn = state.scenario.turns[state.turnIndex];
  if (!turn) { showEndScreen(); return; }

  updateProgress();

  // 학부모 메시지
  const msgEl = $('parent-message');
  msgEl.classList.remove('anim-fade-in');
  void msgEl.offsetWidth;
  msgEl.textContent = turn.parentMessage;
  msgEl.classList.add('anim-fade-in');

  // 이전 응답 관련 패널 모두 숨기기
  $('eval-panel').style.display     = 'none';
  $('model-panel').style.display    = 'none';
  $('next-btn').style.display       = 'none';
  $('teacher-bubble').style.display = 'none';

  state.phase = 'input';
  showInputArea();
}

/* ════════════════════════════════════════════════════
   입력 영역
   ════════════════════════════════════════════════════ */
function showInputArea() {
  const wrap = $('teacher-input-wrap');
  wrap.style.display = 'block';
  wrap.classList.remove('anim-fade-in');
  void wrap.offsetWidth;
  wrap.classList.add('anim-fade-in');

  const ta = $('teacher-textarea');
  ta.value = '';
  ta.style.borderColor = '';
  ta.rows = 2;
  updateCharCount();
  $('submit-btn').disabled = false;
  setTimeout(() => ta.focus(), 200);
}

function updateCharCount() {
  const len = $('teacher-textarea').value.length;
  const el  = $('char-count');
  el.textContent = `${len}자`;
  el.style.color = len < 10 ? 'var(--txt3)' : 'var(--green)';
}

function insertHint(text) {
  const ta  = $('teacher-textarea');
  const val = ta.value;
  ta.value  = val + (val && !val.endsWith(' ') ? ' ' : '') + text;
  ta.focus();
  updateCharCount();
}

/* ════════════════════════════════════════════════════
   답변 전송 → 즉시 다음 대화로
   ════════════════════════════════════════════════════ */
function submitResponse() {
  if (state.phase !== 'input') return;
  const text = $('teacher-textarea').value.trim();
  if (text.length < 3) {
    $('teacher-textarea').style.borderColor = 'var(--red)';
    $('teacher-textarea').focus();
    return;
  }

  state.phase = 'transitioning';
  $('submit-btn').disabled = true;
  $('teacher-input-wrap').style.display = 'none';

  // 점수 계산 (배경 처리, 화면에 즉시 표시 안 함)
  const turn   = state.scenario.turns[state.turnIndex];
  const score  = evaluateInput(text, turn);
  state.allScores.push(score);
  state.turnHistory.push({ parentMsg: turn.parentMessage, teacherInput: text, score });

  // 감정 바만 업데이트
  const delta = score >= 70 ? -18 : score >= 40 ? 3 : 14;
  state.emotionLevel = Math.max(5, Math.min(100, state.emotionLevel + delta));
  updateEmotionBar(state.emotionLevel, false);

  // 평가받기 버튼 활성화 (1턴 이상 완료 시)
  activateEvalBtn();

  // 히스토리에 현재 교환 추가
  appendToHistory(turn.parentMessage, text, score);

  // 마지막 턴이면 전체 평가로
  const isLast = state.turnIndex >= state.totalTurns - 1;
  if (isLast) {
    // 잠깐 딜레이 후 결과 표시
    setTimeout(() => showEndScreen(), 600);
  } else {
    // 다음 턴으로
    state.turnIndex++;
    setTimeout(() => {
      renderTurn();
      // 새 학부모 메시지로 스크롤
      const bubble = document.querySelector('.parent-bubble:not(.history-exchange .parent-bubble)');
      if (bubble) bubble.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 400);
  }
}

/* ════════════════════════════════════════════════════
   대화 히스토리에 직접 추가 (채팅창에 누적)
   ════════════════════════════════════════════════════ */
function appendToHistory(parentMsg, teacherInput, score) {
  var wrap  = $('chat-history-wrap');
  var scCol = score >= 80 ? '#22c55e' : score >= 60 ? '#3b82f6' : score >= 40 ? '#f59e0b' : '#ef4444';

  /* ── 항목 설명 테이블 ── */
  var RD = {
    empathy:  { p:'학부모 감정을 먼저 인정해야 대화가 열립니다', ok:'학부모 감정을 충분히 공감했어요!', half:'공감 표현이 있지만 감정을 더 직접 언급하면 좋아요.', no:'학부모 감정에 대한 공감 표현이 빠져 있습니다.', tip:'예) "많이 놀라셨겠어요", "충분히 이해합니다", "얼마나 속상하셨을까요"' },
    solution: { p:'교사가 무엇을 할지 보여줘야 신뢰가 생깁니다', ok:'구체적인 해결 방향을 잘 제시했어요!', half:'행동 계획이 있지만 더 구체적으로 설명하면 좋아요.', no:'구체적인 행동 계획이 빠져 있습니다.', tip:'예) "확인해 보겠습니다", "함께 방법을 찾겠습니다", "이야기 나눠보겠습니다"' },
    fact:     { p:'상황을 객관적으로 설명해야 오해가 생기지 않습니다', ok:'사실을 명확하게 전달했어요!', half:'사실 기반 설명이 있지만 더 구체적이면 좋아요.', no:'당시 상황이나 경위 설명이 빠져 있습니다.', tip:'예) "수업 중 메시지를 주고받아서", "양호실에서 처치 후", "당시 상황은..."' },
    followup: { p:'언제·어떻게 연락할지 약속하면 불안이 줄어듭니다', ok:'명확한 후속 약속으로 신뢰를 줬어요!', half:'약속이 있지만 구체적 시점을 추가하면 더 좋아요.', no:'후속 연락이나 조치 약속이 빠져 있습니다.', tip:'예) "오늘 방과 후 연락드리겠습니다", "금요일까지 문자로 알려드릴게요"' }
  };

  /* ── breakdown을 여기서 직접 계산 ── */
  var breakdown = [];
  var lengthBonus = 0;
  if (teacherInput && teacherInput.length >= 15) {
    var total2 = 40;
    for (var ri = 0; ri < RUBRIC.length; ri++) {
      var cfg = RUBRIC[ri];
      var hitWords = [];
      for (var wi = 0; wi < cfg.words.length; wi++) {
        if (teacherInput.includes(cfg.words[wi])) hitWords.push(cfg.words[wi]);
      }
      var hits = hitWords.length;
      var pts = cfg.penalty
        ? hits * cfg.perHit
        : Math.min(cfg.max, hits * cfg.perHit);
      total2 += pts;
      breakdown.push({
        key:      cfg.key,
        label:    cfg.label,
        icon:     cfg.icon,
        max:      cfg.penalty ? 0 : cfg.max,
        earned:   pts,
        hits:     hits,
        hitWords: hitWords.slice(0, 4),
        penalty:  !!cfg.penalty
      });
    }
    lengthBonus = teacherInput.length >= 60 ? 5 : 0;
  }

  /* ── turn 찾기 ── */
  var turn = state.scenario && state.scenario.turns
    ? state.scenario.turns[state.turnIndex]
    : null;

  /* ── HTML 조립 ── */
  var html = '';

  /* 학부모 버블 */
  html += '<div class="parent-bubble">';
  html += '<div class="parent-avatar" style="width:32px;height:32px;font-size:15px">\uD83D\uDC69</div>';
  html += '<div class="parent-bubble__body" style="font-size:13px">';
  html += '<div class="parent-bubble__name" style="font-size:10px">' + escHtml(state.scenario.parentName) + '</div>';
  html += escHtml(parentMsg);
  html += '</div></div>';

  /* 교사 버블 */
  html += '<div class="teacher-bubble" style="display:flex">';
  html += '<div class="teacher-bubble__body" style="font-size:13px">';
  html += '<div>' + escHtml(teacherInput) + '</div>';
  html += '<div class="teacher-bubble__meta">';
  html += '<span style="font-size:10px;color:#8294a7">내 답변</span>';
  html += '<span style="font-weight:800;font-size:12px;color:' + scCol + '">' + score + '점</span>';
  html += '</div></div>';
  html += '<div class="teacher-avatar" style="width:32px;height:32px;font-size:15px">\uD83E\uDDD1\u200D\uD83C\uDFEB</div>';
  html += '</div>';

  /* ── 피드백 카드 ── */
  if (turn && breakdown.length > 0) {
    html += '<div style="margin-top:8px;border:1px solid #334155;border-radius:12px;overflow:hidden;font-size:13px">';

    /* 모범 답변 */
    html += '<div style="padding:12px 15px;background:#0f1f38;border-bottom:1px solid #334155">';
    html += '<div style="font-size:11px;font-weight:700;color:#c4b5fd;margin-bottom:7px">&#128172; 모범 답변</div>';
    html += '<div style="color:#e2e8f0;line-height:1.75;padding:9px 12px;background:rgba(99,102,241,.1);border-left:3px solid #6366f1;border-radius:0 8px 8px 0;white-space:pre-wrap;word-break:keep-all">' + escHtml(turn.modelAnswer || '') + '</div>';
    html += '</div>';

    /* 항목별 */
    for (var bi = 0; bi < breakdown.length; bi++) {
      var c = breakdown[bi];
      if (c.penalty) continue;
      var d = RD[c.key];
      if (!d) continue;
      var ratio = c.max > 0 ? c.earned / c.max : 0;
      var col = ratio >= 1 ? '#22c55e' : ratio > 0 ? '#f59e0b' : '#ef4444';
      var sIcon = ratio >= 1 ? '&#9989;' : ratio > 0 ? '&#128993;' : '&#10060;';
      var msg = ratio >= 1 ? d.ok : ratio > 0 ? d.half : d.no;
      var bg = ratio >= 1 ? 'rgba(34,197,94,.05)' : ratio > 0 ? 'rgba(245,158,11,.05)' : 'rgba(239,68,68,.05)';

      html += '<div style="padding:11px 15px;background:' + bg + ';border-bottom:1px solid #1e293b">';

      /* 헤더 */
      html += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:7px">';
      html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
      html += '<span style="font-size:15px">' + (c.icon || '') + '</span>';
      html += '<b style="color:' + col + '">' + escHtml(c.label) + '</b>';
      html += '<span style="font-size:11px;color:#8294a7">' + escHtml(d.p) + '</span>';
      html += '</div>';
      html += '<span style="font-size:12px;font-weight:800;color:' + col + ';padding:2px 9px;background:' + col + '22;border-radius:9px">' + sIcon + ' ' + c.earned + '/' + c.max + '점</span>';
      html += '</div>';

      /* 포함된 표현 */
      if (c.hitWords && c.hitWords.length > 0) {
        html += '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px">';
        html += '<span style="font-size:11px;color:#4ade80;font-weight:600">&#10003; 포함된 표현:</span>';
        for (var hi2 = 0; hi2 < c.hitWords.length; hi2++) {
          html += '<span style="font-size:12px;color:#4ade80;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;padding:1px 7px">' + escHtml(c.hitWords[hi2]) + '</span>';
        }
        html += '</div>';
      }

      /* 상태 메시지 */
      html += '<div style="font-size:12px;padding:7px 11px;border-radius:7px;border-left:3px solid ' + col + ';background:' + col + '11;line-height:1.65">';
      html += '<div style="color:' + col + ';font-weight:600' + (ratio < 1 ? ';margin-bottom:3px' : '') + '">' + escHtml(msg) + '</div>';
      if (ratio < 1) {
        html += '<div style="color:#94a3b8">' + escHtml(d.tip) + '</div>';
      }
      html += '</div>';
      html += '</div>';
    }

    /* 방어적 감점 */
    for (var pi = 0; pi < breakdown.length; pi++) {
      var pc = breakdown[pi];
      if (pc.penalty && pc.hits > 0) {
        html += '<div style="padding:9px 15px;background:rgba(239,68,68,.06);border-top:1px solid #1e293b">';
        html += '<div style="font-size:12px;color:#f87171">&#9888; <b>방어적 표현 감점 (' + pc.earned + '점):</b> "' + escHtml((pc.hitWords || []).join('", "')) + '" — 방어적 표현은 학부모 감정을 악화시킵니다.</div>';
        html += '</div>';
      }
    }

    /* 성실도 보너스 */
    if (lengthBonus) {
      html += '<div style="padding:8px 15px;background:rgba(99,102,241,.05);border-top:1px solid #1e293b;font-size:12px;color:#a5b4fc">&#11088; 성실도 보너스 +5점 — 충분한 길이의 답변이에요!</div>';
    }

    /* 팁 */
    if (turn.tip) {
      html += '<div style="padding:9px 15px;background:#0a1628;border-top:1px solid #334155;font-size:12px;color:#8294a7;line-height:1.55">' + escHtml(turn.tip) + '</div>';
    }

    html += '</div>';
  }

  var div = document.createElement('div');
  div.className = 'history-exchange anim-fade-in';
  div.innerHTML = html;
  wrap.appendChild(div);
}

/* ════════════════════════════════════════════════════
   키워드 자동 평가
   ════════════════════════════════════════════════════ */
function evaluateInput(text, turn) {
  let total = 0;
  for (const cfg of RUBRIC) {
    const hits = cfg.words.filter(w => text.includes(w));
    const raw  = Math.min(Math.abs(cfg.max), hits.length * Math.abs(cfg.perHit));
    total += cfg.penalty ? -raw : raw;
  }
  if (text.length < 20) total = Math.floor(total * 0.6);
  return Math.max(0, Math.min(100, total));
}

/* ════════════════════════════════════════════════════
   평가받기 버튼 (헤더)
   ════════════════════════════════════════════════════ */
function activateEvalBtn() {
  const btn = $('eval-btn');
  if (!btn) return;
  btn.style.opacity       = '1';
  btn.style.pointerEvents = 'auto';
  btn.title               = '지금까지의 전체 상담을 평가합니다';
}

function requestEval() {
  if (state.turnHistory.length === 0) return;
  // 현재 입력 중인 내용이 있으면 먼저 전송
  const text = $('teacher-textarea').value.trim();
  if (state.phase === 'input' && text.length >= 3) {
    submitResponse();
    // submitResponse 내부에서 isLast 여부에 따라 showEndScreen 호출됨
    return;
  }
  showEndScreen();
}

/* ════════════════════════════════════════════════════
   전체 평가 화면
   ════════════════════════════════════════════════════ */
function showEndScreen() {
  state.phase = 'complete';

  // 입력 영역 및 학부모 현재 말풍선 숨기기
  $('teacher-input-wrap').style.display = 'none';
  $('eval-panel').style.display         = 'none';
  $('model-panel').style.display        = 'none';
  $('next-btn').style.display           = 'none';
  $('teacher-bubble').style.display     = 'none';

  // 현재 학부모 발화도 히스토리로 이동 (마지막 미응답 발화 처리)
  const currentParentEl = $('parent-message');
  const currentParentMsg = currentParentEl.textContent;
  const alreadyLogged = state.turnHistory.some(h => h.parentMsg === currentParentMsg);
  if (!alreadyLogged && state.turnIndex < state.totalTurns) {
    // 입력 없이 평가받기를 누른 경우 현재 발화는 0점 처리
  }

  const avg = state.allScores.length
    ? Math.round(state.allScores.reduce((a, b) => a + b, 0) / state.allScores.length)
    : 0;

  const tColor = avg >= 80 ? 'var(--green)' : avg >= 60 ? 'var(--blue)' : avg >= 40 ? 'var(--yellow)' : 'var(--red)';
  const tHex   = avg >= 80 ? '#22c55e'  : avg >= 60 ? '#3b82f6'  : avg >= 40 ? '#f59e0b'  : '#ef4444';
  const tEmoji = avg >= 80 ? '🌟' : avg >= 60 ? '👍' : avg >= 40 ? '📚' : '💪';
  const tLabel = avg >= 80 ? '탁월한 상담' : avg >= 60 ? '양호한 상담' : avg >= 40 ? '개선 필요' : '성장 중';

  setText('end-emoji',   tEmoji);
  setText('end-score',   avg + '점');
  setText('end-summary', state.scenario.teachingPoint);

  const rgba  = {
    'var(--green)':  'rgba(34,197,94,',
    'var(--blue)':   'rgba(59,130,246,',
    'var(--yellow)': 'rgba(245,158,11,',
    'var(--red)':    'rgba(239,68,68,',
  }[tColor] || 'rgba(99,102,241,';
  const badge = $('end-label-badge');
  badge.style.background  = rgba + '0.12)';
  badge.style.borderColor = rgba + '0.35)';
  badge.style.color       = tColor;
  badge.textContent       = tLabel;
  $('end-score').style.color = tColor;

  // ── 턴별 점수 + 모범 답변 비교 ───────────────────
  const completedTurns = state.allScores.length;

  // 차트
  $('end-turn-chart').innerHTML = state.allScores.map((s, i) => {
    const c = s >= 70 ? '#22c55e' : s >= 40 ? '#f59e0b' : '#ef4444';
    const h = Math.max(6, (s / 100) * 48);
    return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:52px">
      <span style="font-size:11px;font-weight:800;color:${c}">${s}</span>
      <div style="width:100%;height:${h}px;background:${c};border-radius:3px;opacity:.85"></div>
      <span style="font-size:10px;color:var(--txt3)">${i+1}회</span>
    </div>`;
  }).join('');

  // ── 턴별 모범 답변 섹션 ──────────────────────────
  const modelSection = $('end-model-section');
  if (modelSection) {
    modelSection.innerHTML = state.turnHistory.map((h, i) => {
      const turn  = state.scenario.turns[i];
      if (!turn) return '';
      const sc    = h.score;
      const scCol = sc >= 70 ? '#22c55e' : sc >= 40 ? '#f59e0b' : '#ef4444';
      return `
      <div style="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border2)">
        <div style="font-size:11px;color:var(--txt3);margin-bottom:8px;font-weight:700">
          ${i+1}번째 대화
          <span style="color:${scCol};margin-left:6px">${sc}점</span>
        </div>
        <div style="font-size:12px;color:var(--txt2);margin-bottom:6px;font-style:italic">
          학부모: "${escHtml(h.parentMsg.slice(0,60))}${h.parentMsg.length>60?'…':''}"
        </div>
        <div style="font-size:13px;color:var(--txt);padding:10px 14px;
                    background:rgba(99,102,241,.07);border-left:3px solid #6366f1;
                    border-radius:0 8px 8px 0;margin-bottom:6px;line-height:1.6">
          💬 모범: "${escHtml(turn.modelAnswer)}"
        </div>
        <div style="font-size:11px;color:var(--txt3)">${turn.tip}</div>
      </div>`;
    }).join('');
  }

  // 강점 / 개선점
  const sc2 = state.scenario;
  if (sc2.strengths?.length) {
    $('end-strengths-list').innerHTML = sc2.strengths.map(s => `<li>${s}</li>`).join('');
    $('end-strengths-section').style.display = 'block';
  } else { $('end-strengths-section').style.display = 'none'; }

  if (sc2.improvements?.length) {
    $('end-improvements-list').innerHTML = sc2.improvements.map(s => `<li>${s}</li>`).join('');
    $('end-improvements-section').style.display = 'block';
  } else { $('end-improvements-section').style.display = 'none'; }

  const doneOf = `${completedTurns}/${state.totalTurns}회 대화`;
  setText('end-next-practice',
    `${doneOf} 완료, 평균 ${avg}점. ` +
    (avg >= 70
      ? '훌륭합니다! 다음 단계 시나리오에 도전해보세요.'
      : '공감 표현(💛)과 후속 약속(📅)을 집중 연습해보세요.')
  );

  const es = $('end-screen');
  es.style.display = 'block';
  es.classList.remove('anim-pop-in');
  void es.offsetWidth;
  es.classList.add('anim-pop-in');
  setTimeout(() => es.scrollIntoView({ behavior:'smooth', block:'start' }), 150);

  saveResult(avg, tLabel);
}

/* ════════════════════════════════════════════════════
   재시작
   ════════════════════════════════════════════════════ */
function restartScenario() {
  state.turnIndex    = 0;
  state.emotionLevel = state.scenario.initialEmotion;
  state.phase        = 'input';
  state.turnHistory  = [];
  state.allScores    = [];

  ['end-screen','eval-panel','model-panel','teacher-bubble'].forEach(id => {
    $(id).style.display = 'none';
  });
  $('next-btn').style.display      = 'none';
  $('chat-history-wrap').innerHTML = '';

  // 평가받기 버튼 비활성화
  const btn = $('eval-btn');
  if (btn) {
    btn.style.opacity       = '.5';
    btn.style.pointerEvents = 'none';
  }

  updateEmotionBar(state.emotionLevel, true);
  renderTurn();
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* ════════════════════════════════════════════════════
   공통 유틸
   ════════════════════════════════════════════════════ */
function updateProgress() {
  const el = $('turn-count');
  if (el) el.textContent = `${state.turnIndex + 1} / ${state.totalTurns}번째 대화`;
}

function updateEmotionBar(level, instant) {
  const hex   = level > 70 ? '#ef4444' : level > 40 ? '#f59e0b' : '#22c55e';
  const color = level > 70 ? 'var(--red)' : level > 40 ? 'var(--yellow)' : 'var(--green)';
  const label = level > 70 ? '격앙' : level > 40 ? '다소 불안' : '안정';

  const fill = $('emotion-fill');
  if (fill) {
    fill.style.transition      = instant ? 'none' : 'width .9s ease, background-color .9s ease';
    fill.style.width           = level + '%';
    fill.style.backgroundColor = hex;
  }
  const lEl = $('emotion-label');
  if (lEl) { lEl.textContent = label; lEl.style.color = color; }
  const vEl = $('emotion-value');
  if (vEl) { vEl.textContent = level; vEl.style.color = color; }
}

function setText(id, text) { const e = $(id); if (e) e.textContent = text; }

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function saveResult(score, label) {
  try {
    const h = JSON.parse(localStorage.getItem('ct_history') || '[]');
    h.push({ scenarioId: state.scenario.id, title: state.scenario.title,
             score, label, date: new Date().toLocaleDateString('ko-KR'), timestamp: Date.now() });
    localStorage.setItem('ct_history', JSON.stringify(h));
  } catch {}
}

function showError(msg) {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;
                min-height:100vh;flex-direction:column;gap:16px">
      <p style="color:var(--txt2)">${escHtml(msg)}</p>
      <a href="index.html" class="btn btn--ghost">← 홈으로</a>
    </div>`;
}

document.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
